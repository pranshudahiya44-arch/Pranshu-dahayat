<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Pranshu Dahayat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            border: 1px solid #e1e8ed;
        }

        .card-header {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #ffffff;
            padding: 35px 25px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .card-header p {
            font-size: 14px;
            color: #b0bec5;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card-body {
            padding: 30px 25px;
        }

        .info-section {
            margin-bottom: 22px;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #78909c;
            margin-bottom: 6px;
            font-weight: 700;
            display: block;
        }

        .value {
            font-size: 16px;
            color: #263238;
            font-weight: 500;
            line-height: 1.4;
        }

        .value a {
            color: #1e88e5;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .value a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        .card-footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #e1e8ed;
            font-size: 12px;
            color: #90a4ae;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- Header Section -->
        <div class="card-header">
            <h1>Pranshu Dahayat</h1>
            <p>Student Profile</p>
        </div>

        <!-- Details Section -->
        <div class="card-body">
            <div class="info-section">
                <span class="label">College / Institution</span>
                <span class="value">Government Polytechnic College, Satna</span>
            </div>

            <div class="info-section">
                <span class="label">Mobile Number</span>
                <span class="value"><a href="tel:+917415162834">+91 7415162834</a></span>
            </div>

            <div class="info-section">
                <span class="label">Email Address</span>
                <span class="value"><a href="mailto:pranshudahiya44@gmail.com">pranshudahiya44@gmail.com</a></span>
            </div>
        </div>

        <!-- Footer Section -->
        <div class="card-footer">
            Government Polytechnic College, Satna • 2026
        </div>
    </div>

</body>
</html>
